task: dna_deepstarr
output: outputs/dna_deepstarr/{algorithm}.jsonl

data:
  split: test
  count: 100

model:
  checkpoint:
  model_id: model_data/dna_deepstarr/D3LM-from-nt
  target_nt: 249
  dtype: bf16
  local_files_only: true

verifier:
  checkpoint: outputs/dna_deepstarr/verifier/best.pt
  context_length: 64
  hidden_dim: 192
  num_heads: 6

oracle:
  model_path: model_data/dna_deepstarr/deepstarr/DeepSTARR.model.h5

generation:
  max_new_tokens: 48
  steps: 50
  remasking: random
  temperature: 1.0
  top_p: 0.9
  top_k: 0
  state_rollout: false

value_guidance:
  length: 48
  N: 8
  max_steps_multiplier: 8
  L_f: 8
  L_b: 8
  K: 32
  B: 1
  lambda: 2.0
  chi: 1.0
  forward_selection: random
  backward_selection: low_conf
  temperature: 1.0
  stop_on_eos: false
  exact_leaf_candidate_value: false
  vgr_sampler: forward_only
  vgb_sampler: original_like

reward:
  thresholds_path: outputs/dna_deepstarr/base/thresholds.json
  eta: 1.0
  mode: tau

training:
  verifier:
    epochs: 10
    global_batch_size: 512
    eval_batch_size: 1024
    lr: 0.0001
    weight_decay: 0.0001
    grad_clip: 1.0
    loss: huber

metrics:
  verifier_cost: 0.0
