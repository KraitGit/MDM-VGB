task: letter
output: outputs/letter/{algorithm}.jsonl

data:
  split: test

model:
  model_name: model_data/letter/Qwen3-0.6B-diffusion-mdlm-v0.1
  dtype: bf16

generation:
  max_new_tokens: 32
  temperature: 1.0

algorithms:
  value_guidance:
    length: 32
    max_steps_multiplier: 8
    L_f: 8
    K: 8
    forward_selection: high_conf
    temperature: 1.0
    stop_on_eos: false
    backward:
      L_b: 8
      B: 1
      lambda: 0.0
      backward_selection: random
