task: sudoku
output: outputs/sudoku/{algorithm}.jsonl

data:
  split: test

model:
  checkpoint: model_data/sudoku/base_model/checkpoints/best.pt

verifier:
  checkpoint:

generation:
  max_new_tokens: 89
  temperature: 1.0
  state_rollout: false

value_guidance:
  length: 89
  N: 8
  L_f: 8
  L_b: 8
  K: 8
  B: 1
  chi:
  forward_selection: high_conf
  backward_selection: random
  temperature: 1.0
  stop_on_eos: true

training:
  verifier: {}

metrics:
  verifier_cost: 0.0
